<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ไพ่ชุดเล็ก (Minor Arcana) - คู่มือไพ่ทาโรต์</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Taviraj:wght@400;500;600;700&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
</head>
<body>

<!-- ============ MINOR ARCANA VIEW ============ -->
<div id="minor" class="view active">
  <div class="view-header">
    <a href="../index.html" class="back-btn" style="text-decoration: none;">← กลับหน้าหลัก</a>
    <h2 style="margin-top:1.2rem;">🔮 Minor Arcana — ไพ่ชุดเล็ก 56 ใบ</h2>
    <p>แบ่งตาม 4 ธาตุ เลือกชุดที่ต้องการศึกษา</p>
    <div class="suit-tabs">
      <div class="suit-tab" data-suit="pentacles">
        <svg viewBox="0 0 24 24"><path d="M12 2c-3 4-3 7 0 10 3-3 3-6 0-10z" fill="currentColor"/></svg>
        pentacles · ดิน
      </div>
      <div class="suit-tab" data-suit="cups">
        <svg viewBox="0 0 24 24"><path d="M5 15c0-3 2-6 2-6h10s2 3 2 6a7 7 0 01-14 0z" fill="currentColor"/></svg>
        cups · น้ำ
      </div>
      <div class="suit-tab" data-suit="swords">
        <svg viewBox="0 0 24 24"><path d="M12 2l3 3-9 9-3-3z" fill="currentColor"/><path d="M15 5l4 4-9 9-4-4z" fill="currentColor" opacity="0.6"/></svg>
        swords · ลม
      </div>
      <div class="suit-tab" data-suit="wands">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        wands · ไฟ
      </div>
    </div>
  </div>
  <div class="container">
    <div class="card-grid" id="minor-grid"></div>
  </div>
</div>

<!-- Card Detail View (for displaying card info) -->
<section id="card-detail" class="view"></section>

<script type="module" src="../app.js"></script>
</body>
</html>
